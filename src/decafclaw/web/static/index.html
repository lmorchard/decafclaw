<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>DecafClaw</title>
  <link rel="stylesheet" href="/static/vendor/bundle/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script type="importmap">
  {
    "imports": {
      "lit": "/static/vendor/bundle/lit.js",
      "lit/directives/unsafe-html.js": "/static/vendor/bundle/lit-unsafe-html.js",
      "marked": "/static/vendor/bundle/marked.js",
      "dompurify": "/static/vendor/bundle/dompurify.js",
      "@milkdown/kit": "/static/vendor/bundle/milkdown.js",
      "codemirror": "/static/vendor/bundle/codemirror.js",
      "hljs": "/static/vendor/bundle/highlight.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <login-view></login-view>
    <div id="chat-layout" class="hidden">
      <!-- Hamburger lives outside #chat-main so it stays visible on mobile
           when #wiki-main replaces #chat-main (see styles/mobile.css). -->
      <button id="hamburger-btn" class="hamburger-btn dc-floating-btn" aria-label="Open sidebar">&#9776;</button>
      <div id="sidebar-backdrop"></div>
      <conversation-sidebar></conversation-sidebar>
      <div id="sidebar-resize-handle"></div>
      <div id="wiki-main" class="hidden">
        <wiki-page></wiki-page>
        <file-page class="hidden"></file-page>
        <config-panel class="hidden"></config-panel>
      </div>
      <div id="wiki-resize-handle" class="hidden"></div>
      <div id="chat-main">
        <div id="mobile-header">
          <div id="connection-banner" class="hidden">Reconnecting...</div>
        </div>
        <chat-view></chat-view>
        <chat-input></chat-input>
      </div>
      <div id="canvas-resize-handle" class="hidden"></div>
      <div id="canvas-main" class="canvas-collapsed">
        <canvas-panel></canvas-panel>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script type="module" src="/static/components/canvas-panel.js"></script>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
