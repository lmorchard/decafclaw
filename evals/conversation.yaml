# Conversation tools — LLM-behavior angle only. Compaction history-truncation
# bookkeeping, search text-matching mechanics, archive file I/O are all
# covered by 28 unit tests across tests/test_conversation_search.py,
# tests/test_compaction.py, tests/test_conversation_manager.py.
#
# Uses PR-A's setup.conversation_history (closes #353) to seed a pre-existing
# archive so we don't have to organically build history inside the test.

# -- Explicit conversation_search request ------------------------------------

- name: "reaches for conversation_search on explicit history query"
  setup:
    # `conversation_search` matches by stemmed word overlap plus substring
    # (see #535), so exact-token phrasing is no longer required — but naming
    # the distinctive provider tokens verbatim keeps this case deterministic.
    conversation_history:
      - role: user
        content: "I'm planning to switch our embedding providers from OpenAI to Vertex."
      - role: assistant
        content: "Got it. Let me know if you want help benchmarking embedding providers."
      - role: user
        content: "By the way, I also tried out Cohere embedding providers briefly — okay but not great."
      - role: assistant
        content: "Noted. Vertex it is unless you want me to run a comparison."
  input: "Search our past chat history for what I said about embedding providers and list everything I mentioned."
  expect:
    # Vertex and Cohere are the distinctive tokens that prove history was
    # actually retrieved (vs. the agent fabricating). OpenAI is omitted
    # because the agent often paraphrases "switching to Vertex" without
    # naming the "from" side.
    response_contains_all: ["Vertex", "Cohere"]
    max_tool_calls: 5
    max_tool_errors: 0
    expect_tool: conversation_search

# -- Inflection-tolerant recall (#535) ---------------------------------------
#
# The seed is SINGULAR ("embedding provider") but the query is PLURAL
# ("embedding providers"). Under the old substring-only match this returned
# zero hits and the agent would deny ever discussing it. Stemmed matching
# now bridges the plural/singular gap. Naming Vertex in the seed lets the
# assertion prove real retrieval rather than fabrication.

- name: "recalls history across singular/plural query mismatch (#535)"
  setup:
    conversation_history:
      - role: user
        content: "I'm planning to switch our embedding provider from OpenAI to Vertex."
      - role: assistant
        content: "Got it. Vertex it is unless you want me to run a comparison."
  input: "Search our past chat history for what I said about embedding providers."
  expect:
    response_contains: "Vertex"
    max_tool_calls: 5
    max_tool_errors: 0
    expect_tool: conversation_search

# -- Recall from seeded history ----------------------------------------------
#
# Validates that setup.conversation_history is reachable by the agent end-to-
# end AND that the agent answers directly from history without reaching for
# conversation_search. Reflection is disabled per #534 so the judge's retry
# path can't invoke a spurious conversation_search and break the assertion.

- name: "answers from seeded conversation history"
  setup:
    reflection_enabled: false
    conversation_history:
      - role: user
        content: "I just got back from a trip to Reykjavik — first time in Iceland."
      - role: assistant
        content: "Welcome back. How was it?"
      - role: user
        content: "Wonderful. The Blue Lagoon was packed but worth it."
      - role: assistant
        content: "Glad to hear."
  input: "What city did I just visit?"
  expect:
    response_contains: "Reykjavik"
    expect_no_tool: conversation_search
    max_tool_calls: 1
    max_tool_errors: 1
