- name: "save then recall hobby"
  turns:
    - input: "Remember that I play guitar on weekends"
      expect:
        response_contains: "guitar"
        max_tool_calls: 3
        max_tool_errors: 0
    - input: "What are my hobbies?"
      expect:
        response_contains: "guitar"
        max_tool_calls: 5
        max_tool_errors: 0

- name: "save preference then ask about it indirectly"
  turns:
    - input: "I really love spicy Thai food, please remember that"
      expect:
        response_contains_all:
          - "Thai"
          - "spicy"
        max_tool_calls: 3
        max_tool_errors: 0
    - input: "What kind of food should we order for dinner?"
      expect:
        response_contains_all:
          - "Thai"
          - "spicy"
        max_tool_calls: 5
        max_tool_errors: 0

- name: "save multiple facts then recall all"
  turns:
    - input: "Remember that my dog's name is Luna"
      expect:
        response_contains: "Luna"
        max_tool_calls: 3
        max_tool_errors: 0
    - input: "Also remember that I work at Mozilla"
      expect:
        response_contains: "Mozilla"
        max_tool_calls: 3
        max_tool_errors: 0
    - input: "Tell me everything you know about me"
      expect:
        response_contains_all:
          - "Luna"
          - "Mozilla"
        max_tool_calls: 5
        max_tool_errors: 0

- name: "correct a memory"
  turns:
    - input: "Remember that my favorite color is blue"
      expect:
        response_contains: "blue"
        max_tool_calls: 3
        max_tool_errors: 0
    - input: "Actually, I changed my mind. My favorite color is green now. Please update your memory."
      expect:
        response_contains: "green"
        max_tool_calls: 5
        max_tool_errors: 1
    - input: "What is my favorite color?"
      expect:
        response_contains: "green"
        max_tool_calls: 5
        max_tool_errors: 0

# #306: a fact journaled in an earlier turn is auto-surfaced (recency
# window) at the next turn's start, so the agent recalls it from context
# without a fresh vault lookup. reflection_enabled: false because the
# turn-2 expect_no_tool assertion must not be perturbed by a reflection
# retry invoking a search tool.
- name: "recalls a just-journaled fact from recency surfacing"
  setup:
    reflection_enabled: false
  turns:
    - input: "Please journal this so you remember it: the staging deploy key rotates every Tuesday at 4pm."
      expect:
        expect_tool: vault_journal_append
        max_tool_calls: 5
        max_tool_errors: 0
    - input: "When does the staging deploy key rotate?"
      expect:
        response_contains: "Tuesday"
        expect_no_tool: [vault_search, vault_read, vault_recent]
        max_tool_calls: 3
        max_tool_errors: 0
